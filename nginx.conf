server {
    listen 8000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.css$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(html|htm)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
